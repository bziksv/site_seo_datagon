# Пример: cabinet.titlo.ru → Laravel на localhost:3004
# VPS 155.212.171.103, путь: /var/www/cabinet_titl_usr/data/www/cabinet.titlo.ru
# PM2: cabinet-titlo (php artisan serve --port=3004) или PHP-FPM через FastPanel
# titlo.ru — :3003, cabinet.datagon.ru (legacy) — :3002

upstream cabinet_titlo {
    server 127.0.0.1:3004;
}

server {
    listen 80;
    listen [::]:80;
    server_name cabinet.titlo.ru;
    return 301 https://cabinet.titlo.ru$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cabinet.titlo.ru;

    # ssl_certificate     /etc/letsencrypt/live/cabinet.titlo.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/cabinet.titlo.ru/privkey.pem;

    location / {
        proxy_pass http://cabinet_titlo;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
